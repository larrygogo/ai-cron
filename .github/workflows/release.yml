name: Release
on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: --target aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Cron ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate updater manifest (latest.json)
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace('v', '');
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            const assets = release.data.assets;
            const find = (s) => assets.find(a => a.name.endsWith(s));
            const manifest = {
              version,
              notes: `AI Cron ${tag}`,
              pub_date: new Date().toISOString(),
              platforms: {},
            };
            for (const [key, zipSuffix, sigSuffix] of [
              ['windows-x86_64', '.nsis.zip', '.nsis.zip.sig'],
              ['darwin-aarch64', '.app.tar.gz', '.app.tar.gz.sig'],
            ]) {
              const zip = find(zipSuffix);
              const sig = find(sigSuffix);
              if (zip && sig) {
                const sigResponse = await fetch(sig.browser_download_url);
                manifest.platforms[key] = {
                  signature: await sigResponse.text(),
                  url: zip.browser_download_url,
                };
              }
            }
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'latest.json',
              data: JSON.stringify(manifest, null, 2),
            });
